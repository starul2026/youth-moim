<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 출석체크 시스템 (보안 강화형)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (Excel 처리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .click-scale:active { transform: scale(0.98); }
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6 relative">
        
        <!-- 헤더 영역 -->
        <div class="text-center pb-6 border-b border-slate-200">
            <!-- 제목 클릭 시 관리자 모드 진입 -->
            <h1 onclick="openAdminAuth()" class="text-3xl font-bold text-slate-900 mb-2 cursor-pointer hover:opacity-80 transition-opacity select-none" title="관리자 모드">
                📋 동아리 출석체크
            </h1>
            <p id="subTitle" class="text-slate-500">본인의 동아리를 선택하고 출석을 완료해주세요.</p>
            
            <div id="cloudStatus" class="inline-flex items-center gap-1.5 mt-3 text-xs font-medium text-slate-400 bg-white border border-slate-100 px-3 py-1 rounded-full shadow-sm border-dashed">
                <span class="w-2 h-2 rounded-full bg-slate-300" id="cloudDot"></span>
                <span id="cloudText">데이터 연결 중...</span>
            </div>
        </div>

        <div id="mainLayout" class="flex justify-center mt-6 transition-all duration-500">
            <div id="leftCol" class="w-full max-w-md space-y-6">
                
                <!-- 1. 관리자 설정 패널 -->
                <div id="adminSec1" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-blue-100 ring-4 ring-blue-50/50">
                    <h2 class="text-lg font-bold mb-4 text-blue-700 flex items-center justify-between">
                        <span>⚙️ 관리자 설정</span>
                        <button onclick="toggleAdminMode()" class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-lg hover:bg-slate-200">종료</button>
                    </h2>
                    
                    <div class="mb-6 pb-6 border-b border-blue-50">
                        <label class="block text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">명단 업로드 및 백업 복구 (다운로드한 엑셀도 가능)</label>
                        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" 
                            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-slate-200 rounded-full p-1 mb-2"
                        />
                        <button onclick="downloadSample()" class="text-xs text-blue-600 hover:text-blue-800 underline underline-offset-4">양식 샘플 다운로드</button>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">관리자 비밀번호 변경</label>
                        <div class="flex gap-2">
                            <input type="password" id="newAdminPw" placeholder="새 비밀번호" class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
                            <button onclick="changeAdminPassword()" class="bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-blue-700 transition-colors">변경</button>
                        </div>
                    </div>
                </div>

                <!-- 관리자용 통계 패널 (새로 추가, 관리자 모드에서만 노출) -->
                <div id="adminSec2" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📈 날짜별 상세 통계</h2>
                    <div id="dailyStatsContainer" class="max-h-[350px] overflow-y-auto custom-scrollbar pr-2">
                        <div class="text-center text-slate-400 py-4 text-sm">데이터가 없습니다.</div>
                    </div>
                </div>

                <!-- 2. 출석 체크 폼 -->
                <div id="userSec2" class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 transition-all duration-500">
                    <h2 class="text-xl font-bold mb-6">출석 체크</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">동아리 선택</label>
                            <select id="clubSelect" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none appearance-none bg-no-repeat bg-right" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23cbd5e1%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E'); background-position: right 12px center; background-size: 18px;">
                                <option value="">명단을 먼저 업로드해주세요</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">이름</label>
                            <input type="text" id="userName" placeholder="이름을 입력하세요" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-50" onkeypress="if(event.key === 'Enter') submitAttendance()" disabled>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">성별</label>
                                <div class="flex gap-4">
                                    <label class="flex items-center gap-2 text-sm cursor-pointer group"><input type="radio" name="gender" value="남자" class="w-4 h-4 accent-blue-600" disabled> <span class="group-hover:text-blue-600 transition-colors">남자</span></label>
                                    <label class="flex items-center gap-2 text-sm cursor-pointer group"><input type="radio" name="gender" value="여자" class="w-4 h-4 accent-pink-500" disabled> <span class="group-hover:text-pink-500 transition-colors">여자</span></label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">나이</label>
                                <div class="flex flex-col gap-3">
                                    <label class="flex items-center gap-2 text-sm cursor-pointer group"><input type="radio" name="age" value="19~24세" class="w-4 h-4 accent-indigo-600" disabled> <span class="group-hover:text-indigo-600 transition-colors">19세~24세</span></label>
                                    <label class="flex items-center gap-2 text-sm cursor-pointer group"><input type="radio" name="age" value="25~39세" class="w-4 h-4 accent-indigo-600" disabled> <span class="group-hover:text-indigo-600 transition-colors">25세~39세</span></label>
                                </div>
                            </div>
                        </div>
                        <button id="submitBtn" onclick="submitAttendance()" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-blue-200 click-scale disabled:bg-slate-300 mt-4">출석 완료</button>
                    </div>
                </div>
            </div>

            <!-- 3. 실시간 현황판 (관리자 전용) -->
            <div id="adminSec3" class="hidden md:col-span-2 space-y-6 ml-0 md:ml-6 flex-1">
                
                <!-- 상단: 실시간 전체 출석 로그 -->
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        ⏱️ 실시간 전체 출석 로그
                    </h2>
                    <div id="realtimeLog" class="h-64 overflow-y-auto custom-scrollbar border border-slate-100 rounded-xl p-3 bg-slate-50 flex flex-col gap-2">
                        <!-- 로그가 여기에 추가됩니다 -->
                    </div>
                </div>

                <!-- 하단: 동아리별 카드 현황 -->
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">📊 동아리별 현황</h2>
                        <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2.5 px-4 rounded-xl transition-all flex items-center shadow-md click-scale">
                            결과 엑셀 다운로드
                        </button>
                    </div>
                    <div id="dashboard" class="grid grid-cols-1 xl:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto custom-scrollbar p-1">
                        <div class="col-span-full text-center py-10 text-slate-400 border-2 border-dashed border-slate-100 rounded-3xl">명단이 없습니다.</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 출석 성공 팝업 (모달) -->
    <div id="successModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 modal-bg">
        <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all scale-100">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-2xl font-extrabold text-slate-800 mb-2">출석 완료</h3>
            <p id="successModalText" class="text-slate-600 mb-8 font-medium">홍길동님, 출석이 완료되었습니다.</p>
            <button onclick="closeSuccessModal()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition-colors click-scale shadow-lg shadow-blue-200 text-lg">
                확인
            </button>
        </div>
    </div>

    <!-- 관리자 인증 모달 -->
    <div id="authModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-bg">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold mb-4">관리자 인증</h3>
            <input type="password" id="adminAuthPw" placeholder="비밀번호를 입력하세요" class="w-full border border-slate-300 rounded-xl p-3 mb-4 outline-none focus:ring-2 focus:ring-blue-500" onkeypress="if(event.key === 'Enter') checkAdminAuth()">
            <div class="flex gap-2">
                <button onclick="closeAdminAuth()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">취소</button>
                <button onclick="checkAdminAuth()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors">확인</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 (에러 등) -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white opacity-0 pointer-events-none transition-all duration-300 z-50 font-bold"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAXEKmFKOVNB8cZank9khUfLQODzBUhBlM",
            authDomain: "attendance-check-fa0cb.firebaseapp.com",
            projectId: "attendance-check-fa0cb",
            storageBucket: "attendance-check-fa0cb.firebasestorage.app",
            messagingSenderId: "593138294374",
            appId: "1:593138294374:web:7819265228855e932717a7",
            measurementId: "G-C9QL4VH85K"
        };

        // 중요: 회원님의 실제 데이터가 있는 v2 경로입니다.
        const appId = 'club-attendance-final-v2';
        
        let app, auth, db, user = null;
        window.clubData = {};
        window.adminPassword = "admin";
        window.isAdmin = false;

        async function init() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (u) {
                        updateCloudStatus("🟢 실시간 연동 중", "green");
                        syncData();
                    }
                });
            } catch (e) {
                updateCloudStatus("🔴 연결 오류", "red");
            }
        }

        function syncData() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_storage', 'global_state');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    window.clubData = data.clubData || {};
                    window.adminPassword = data.adminPassword || "admin";
                    updateUI();
                }
            });
        }

        async function saveData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_storage', 'global_state');
            await setDoc(docRef, { 
                clubData: window.clubData,
                adminPassword: window.adminPassword
            });
        }

        function updateCloudStatus(text, color) {
            document.getElementById('cloudText').textContent = text;
            document.getElementById('cloudDot').className = `w-2 h-2 rounded-full ${color === 'green' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`;
        }

        // --- 출석 완료 팝업 제어 ---
        window.closeSuccessModal = function() {
            document.getElementById('successModal').classList.add('hidden');
        }

        // --- 관리자 모드 로직 ---
        window.openAdminAuth = function() {
            if (window.isAdmin) {
                window.toggleAdminMode();
            } else {
                document.getElementById('authModal').classList.remove('hidden');
                document.getElementById('adminAuthPw').focus();
            }
        }

        window.closeAdminAuth = function() {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('adminAuthPw').value = '';
        }

        window.checkAdminAuth = function() {
            const pw = document.getElementById('adminAuthPw').value;
            if (pw === window.adminPassword) {
                window.isAdmin = true;
                window.updateUILayout();
                window.closeAdminAuth();
            } else {
                window.showToast("비밀번호가 틀렸습니다.", "error");
            }
        }

        window.changeAdminPassword = async function() {
            const newPw = document.getElementById('newAdminPw').value;
            if (newPw.length < 2) {
                window.showToast("최소 2자 이상 입력해주세요.", "error");
                return;
            }
            window.adminPassword = newPw;
            await saveData();
            document.getElementById('newAdminPw').value = '';
            window.showToast("비밀번호가 변경되었습니다.");
        }

        window.toggleAdminMode = function() {
            window.isAdmin = !window.isAdmin;
            window.updateUILayout();
        }

        window.updateUILayout = function() {
            const subTitle = document.getElementById('subTitle');
            const adminSec1 = document.getElementById('adminSec1');
            const adminSec2 = document.getElementById('adminSec2');
            const adminSec3 = document.getElementById('adminSec3');
            const userSec2 = document.getElementById('userSec2');
            const mainLayout = document.getElementById('mainLayout');
            
            if (window.isAdmin) {
                mainLayout.className = "flex flex-col md:flex-row mt-6 transition-all duration-500 gap-6 items-start";
                adminSec1.classList.remove('hidden');
                adminSec2.classList.remove('hidden');
                adminSec3.classList.remove('hidden');
                userSec2.classList.add('hidden'); // 관리자 모드 시 출석폼 숨김
                subTitle.innerHTML = "관리자 모드 활성화됨 <span class='text-blue-500'>(제목 클릭 시 종료)</span>";
            } else {
                mainLayout.className = "flex justify-center mt-6 transition-all duration-500";
                adminSec1.classList.add('hidden');
                adminSec2.classList.add('hidden');
                adminSec3.classList.add('hidden');
                userSec2.classList.remove('hidden'); // 유저 모드 시 출석폼 보임
                subTitle.textContent = "본인의 동아리를 선택하고 출석을 완료해주세요.";
            }
        }

        // --- 출석 시스템 로직 ---
        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                if (json.length === 0) return;

                const headers = json[0];
                let newData = {};

                // 백업된 엑셀 파일인지 확인 (출석인원, 이름 헤더가 있는지)
                if (headers.includes("출석인원") && headers.includes("이름")) {
                    for (let i = 1; i < json.length; i++) {
                        const row = json[i];
                        const clubName = row[0];
                        const total = parseInt(row[1]);
                        const attName = row[4];
                        const gender = row[5];
                        const age = row[6];
                        const date = row[7];
                        const time = row[8];

                        if (!clubName || isNaN(total)) continue;

                        if (!newData[clubName]) {
                            newData[clubName] = { total: total, attendees: [] };
                        }

                        // 출석자가 있는 경우 (이름이 '-' 가 아님)
                        if (attName && attName !== "-") {
                            const dateTimeStr = `${date} ${time}`;
                            newData[clubName].attendees.push({
                                name: attName,
                                gender: gender,
                                age: age,
                                time: dateTimeStr,
                                timestamp: new Date(dateTimeStr.replace(' ', 'T')).getTime() || Date.now()
                            });
                        }
                    }
                    window.clubData = newData;
                    await saveData();
                    window.showToast("기존 데이터 복구 완료!");
                } else {
                    // 일반 명단 업로드 처리
                    json.forEach((row, idx) => {
                        if (idx === 0 && row[0] === "동아리명") return; // 헤더 건너뛰기
                        const name = row[0]; const total = parseInt(row[1]);
                        if (name && !isNaN(total)) newData[name] = { total, attendees: [] };
                    });
                    window.clubData = newData;
                    await saveData();
                    window.showToast("새 명단이 등록되었습니다.");
                }
                document.getElementById('excelFile').value = '';
            };
            reader.readAsArrayBuffer(file);
        });

        window.submitAttendance = async function() {
            const clubName = document.getElementById('clubSelect').value;
            const name = document.getElementById('userName').value.trim();
            const gender = document.querySelector('input[name="gender"]:checked')?.value;
            const age = document.querySelector('input[name="age"]:checked')?.value;
            
            if (!clubName || !name || !gender || !age) { window.showToast("모든 항목을 선택/입력해주세요.", "error"); return; }
            
            const club = window.clubData[clubName];
            if (club.attendees.some(a => a.name === name)) { window.showToast("이미 출석한 이름입니다.", "error"); return; }
            
            const now = new Date();
            // 시간 포맷 정리 (예: 2024-05-17 14:30)
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            // timestamp를 추가하여 나중에 정렬할 때 사용
            club.attendees.push({ 
                name, gender, age, 
                time: `${dateStr} ${timeStr}`,
                timestamp: Date.now()
            });
            
            // 입력창 초기화
            document.getElementById('userName').value = '';
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            
            // 저장 및 UI 갱신
            await saveData();
            
            // 성공 팝업(모달) 띄우기
            document.getElementById('successModalText').innerHTML = `<span class="font-bold text-blue-600">${clubName}</span>에<br><span class="font-bold text-lg">${name}</span>님 출석 기록 완료!`;
            document.getElementById('successModal').classList.remove('hidden');
        }

        window.deleteAttendee = async function(clubName, attendeeName) {
            window.clubData[clubName].attendees = window.clubData[clubName].attendees.filter(a => a.name !== attendeeName);
            await saveData();
            window.showToast("기록 삭제 완료");
        }

        function updateUI() {
            const select = document.getElementById('clubSelect');
            const dashboard = document.getElementById('dashboard');
            const logContainer = document.getElementById('realtimeLog');
            const curVal = select.value;
            
            // 1. 셀렉트 박스 업데이트
            select.innerHTML = '<option value="">동아리를 선택하세요</option>';
            Object.keys(window.clubData).forEach(c => {
                const opt = document.createElement('option');
                opt.value = opt.textContent = c;
                select.appendChild(opt);
            });
            if (curVal && window.clubData[curVal]) select.value = curVal;
            
            const hasClubs = Object.keys(window.clubData).length > 0;
            document.getElementById('userName').disabled = !hasClubs;
            document.getElementById('submitBtn').disabled = !hasClubs;
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = !hasClubs);
            
            dashboard.innerHTML = '';
            let allLogs = []; // 전체 로그 수집용 배열
            let statsByDate = {}; // 날짜별 통계 수집용 객체

            // 2. 대시보드 카드 렌더링 및 로그/통계 수집
            for (const [name, data] of Object.entries(window.clubData)) {
                const count = data.attendees.length;
                
                // [조건 3 반영] 50% 이상(크거나 같다)이면 과반수 달성(O)
                const isMajority = count >= (data.total / 2);
                
                const percent = Math.min((count / data.total) * 100, 100);
                
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-2xl shadow-sm border-2 transition-all ${isMajority ? 'border-green-400' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <h3 class="font-bold truncate text-slate-800">${name}</h3>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${isMajority ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">${isMajority ? '과반수 달성' : '미달'}</span>
                    </div>
                    <div class="flex justify-between text-sm mb-2 font-bold"><span>${count} / ${data.total}명</span><span>${Math.round(percent)}%</span></div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4"><div class="h-full transition-all duration-500 ${isMajority ? 'bg-green-500' : 'bg-blue-500'}" style="width: ${percent}%"></div></div>
                    <div class="bg-slate-50 rounded-xl p-2 h-24 overflow-y-auto custom-scrollbar flex flex-wrap content-start gap-1.5">
                        ${data.attendees.map(a => `<span class="bg-white border text-[10px] px-2 py-1 rounded-lg flex items-center shadow-sm"><b>${a.name}</b><button onclick="deleteAttendee('${name}', '${a.name}')" class="ml-1 text-slate-300 hover:text-red-500">×</button></span>`).join('') || '<span class="text-[10px] text-slate-300 italic p-1">데이터 없음</span>'}
                    </div>`;
                dashboard.appendChild(card);

                // 로그 및 날짜별 상세 통계 수집
                data.attendees.forEach(att => {
                    allLogs.push({ club: name, ...att });
                    
                    const dateOnly = att.time.split(' ')[0];
                    if (!statsByDate[dateOnly]) {
                        statsByDate[dateOnly] = { m1: 0, f1: 0, m2: 0, f2: 0, total: 0 };
                    }
                    statsByDate[dateOnly].total++;
                    if (att.age === '19~24세' && att.gender === '남자') statsByDate[dateOnly].m1++;
                    else if (att.age === '19~24세' && att.gender === '여자') statsByDate[dateOnly].f1++;
                    else if (att.age === '25~39세' && att.gender === '남자') statsByDate[dateOnly].m2++;
                    else if (att.age === '25~39세' && att.gender === '여자') statsByDate[dateOnly].f2++;
                });
            }

            // 날짜별 상세 통계 화면 렌더링
            const statsContainer = document.getElementById('dailyStatsContainer');
            if (statsContainer) {
                const sortedDates = Object.keys(statsByDate).sort((a,b) => b.localeCompare(a));
                if (sortedDates.length === 0) {
                    statsContainer.innerHTML = '<div class="text-center text-slate-400 py-8 text-sm font-medium">출석 데이터가 없습니다.</div>';
                } else {
                    let statsHtml = '';
                    sortedDates.forEach(date => {
                        const s = statsByDate[date];
                        statsHtml += `
                            <div class="mb-4 border-b border-slate-100 pb-4 last:border-0 last:pb-0">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-bold text-slate-800">${date}</h4>
                                    <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">총 ${s.total}명</span>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    <div class="bg-blue-50 text-blue-700 p-2 rounded flex justify-between"><span>19~24 남</span> <b>${s.m1}명</b></div>
                                    <div class="bg-pink-50 text-pink-700 p-2 rounded flex justify-between"><span>19~24 여</span> <b>${s.f1}명</b></div>
                                    <div class="bg-blue-50 text-blue-700 p-2 rounded flex justify-between"><span>25~39 남</span> <b>${s.m2}명</b></div>
                                    <div class="bg-pink-50 text-pink-700 p-2 rounded flex justify-between"><span>25~39 여</span> <b>${s.f2}명</b></div>
                                </div>
                            </div>
                        `;
                    });
                    statsContainer.innerHTML = statsHtml;
                }
            }

            // 3. 실시간 전체 출석 로그 렌더링 (최신순 정렬)
            logContainer.innerHTML = '';
            if (allLogs.length === 0) {
                logContainer.innerHTML = '<div class="text-center text-slate-400 py-8 text-sm font-medium">아직 출석 기록이 없습니다.</div>';
            } else {
                // 시간(timestamp) 기준 내림차순 정렬 (최신이 위로)
                allLogs.sort((a, b) => {
                    const timeA = a.timestamp || new Date(a.time.replace(' ', 'T')).getTime() || 0;
                    const timeB = b.timestamp || new Date(b.time.replace(' ', 'T')).getTime() || 0;
                    return timeB - timeA;
                });

                allLogs.forEach(log => {
                    const timeOnly = log.time.split(' ')[1] || log.time; // 시간만 추출
                    logContainer.innerHTML += `
                        <div class="bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center text-sm">
                            <div class="flex items-center gap-2">
                                <span class="bg-blue-50 text-blue-600 font-bold px-2 py-1 rounded-md text-xs truncate max-w-[100px]">${log.club}</span>
                                <span class="font-bold text-slate-800">${log.name}</span>
                                <span class="text-[11px] text-slate-400 hidden sm:inline-block">(${log.gender}, ${log.age})</span>
                            </div>
                            <div class="text-xs font-bold text-slate-500 bg-slate-100 px-2.5 py-1.5 rounded-lg flex-shrink-0">${timeOnly}</div>
                        </div>
                    `;
                });
            }
        }

        window.exportToExcel = function() {
            if (Object.keys(window.clubData).length === 0) return;
            const rows = [["동아리명", "총인원", "출석인원", "과반수 확인", "이름", "성별", "나이", "날짜", "시간"]];
            
            for (const [clubName, data] of Object.entries(window.clubData)) {
                const count = data.attendees.length;
                
                // [조건 3 반영] 엑셀 출력시에도 50% 이상이면 과반수(O)
                const isMajority = count >= (data.total / 2) ? "O" : "X";
                
                if (count === 0) {
                    rows.push([clubName, data.total, 0, "X", "-", "-", "-", "-", "-"]);
                } else {
                    data.attendees.forEach(att => {
                        const [date, time] = att.time.split(' ');
                        rows.push([clubName, data.total, count, isMajority, att.name, att.gender, att.age, date, time]);
                    });
                }
            }
            
            const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "상세결과");
            XLSX.writeFile(wb, `출석결과_${new Date().toLocaleDateString()}.xlsx`);
        }

        window.downloadSample = function() {
            const ws = XLSX.utils.aoa_to_sheet([["동아리명", "총인원"], ["샘플동아리", 10]]);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "양식");
            XLSX.writeFile(wb, "동아리명단_양식.xlsx");
        }

        // 일반 토스트 알림 함수
        window.showToast = function(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            t.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white transition-all duration-300 z-50 font-bold ${type==='success'?'bg-slate-800':'bg-red-600'}`;
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        init();
    </script>
</body>
</html>
