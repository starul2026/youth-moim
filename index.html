<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 출석체크 시스템 (실시간 클라우드)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (Excel 처리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .click-scale:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6 relative">
        
        <!-- 헤더 영역 -->
        <div class="text-center pb-6 border-b border-slate-200">
            <!-- 제목 클릭 시 관리자 모드 토글 (테스트를 위해 팝업창 없이 즉시 전환) -->
            <h1 onclick="toggleAdminMode()" class="text-3xl font-bold text-slate-900 mb-2 cursor-pointer hover:opacity-80 transition-opacity select-none" title="관리자 모드">
                📋 동아리 출석체크
            </h1>
            <p id="subTitle" class="text-slate-500">본인의 동아리를 선택하고 출석을 완료해주세요.</p>
            
            <!-- 연동 상태 표시 -->
            <div id="cloudStatus" class="inline-flex items-center gap-1.5 mt-3 text-xs font-medium text-slate-400 bg-white border border-slate-100 px-3 py-1 rounded-full shadow-sm border-dashed">
                <span class="w-2 h-2 rounded-full bg-slate-300" id="cloudDot"></span>
                <span id="cloudText">데이터 연결 중...</span>
            </div>
        </div>

        <div id="mainLayout" class="flex justify-center mt-6 transition-all duration-500">
            <div id="leftCol" class="w-full max-w-md space-y-6">
                <!-- 1. 명단 업로드 (관리자 전용 - 번호 제거) -->
                <div id="adminSec1" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-blue-100 ring-4 ring-blue-50/50">
                    <h2 class="text-lg font-bold mb-4 text-blue-700 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
                        명단 업로드 (관리자)
                    </h2>
                    <div class="mb-4">
                        <label class="block text-xs text-slate-500 mb-2 font-semibold uppercase tracking-wider">엑셀 파일 (A열: 동아리명 / B열: 인원수)</label>
                        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" 
                            class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-slate-200 rounded-full p-1"
                        />
                    </div>
                    <button onclick="downloadSample()" class="text-sm text-blue-600 hover:text-blue-800 underline underline-offset-4">양식 샘플 다운로드</button>
                </div>

                <!-- 2. 출석 체크 섹션 (번호 제거) -->
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                    <h2 class="text-xl font-bold mb-6">출석 체크</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">동아리 선택</label>
                            <select id="clubSelect" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:bg-slate-50 disabled:cursor-not-allowed">
                                <option value="">명단을 먼저 업로드해주세요</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">이름</label>
                            <input type="text" id="userName" placeholder="이름을 입력하세요" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:bg-slate-50 disabled:cursor-not-allowed" onkeypress="if(event.key === 'Enter') submitAttendance()" disabled>
                        </div>
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">성별</label>
                                <div class="flex gap-4">
                                    <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="gender" value="남자" class="w-4 h-4 accent-blue-600" disabled> 남자</label>
                                    <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="gender" value="여자" class="w-4 h-4 accent-pink-500" disabled> 여자</label>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">나이</label>
                                <div class="flex flex-col gap-3">
                                    <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="age" value="19~24세" class="w-4 h-4 accent-indigo-600" disabled> 19세~24세</label>
                                    <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="radio" name="age" value="25~39세" class="w-4 h-4 accent-indigo-600" disabled> 25세~39세</label>
                                </div>
                            </div>
                        </div>
                        <button id="submitBtn" onclick="submitAttendance()" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-blue-200 click-scale disabled:bg-slate-300 mt-4">출석 완료</button>
                    </div>
                </div>
            </div>

            <!-- 3. 대시보드 (관리자 전용 - 번호 제거) -->
            <div id="adminSec3" class="hidden md:col-span-2 space-y-6 ml-0 md:ml-6">
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 min-h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                            출석 현황 (관리자)
                        </h2>
                        <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2.5 px-4 rounded-xl transition-all flex items-center shadow-md click-scale">
                            결과 엑셀 다운로드
                        </button>
                    </div>
                    <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div class="col-span-full text-center py-20 text-slate-400 border-2 border-dashed border-slate-100 rounded-3xl font-medium">
                            관리자 모드에서 명단을 업로드해주세요.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white opacity-0 pointer-events-none transition-all duration-300 z-50 font-bold"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정 (이미 입력하신 정보)
        const firebaseConfig = {
            apiKey: "AIzaSyAXEKmFKOVNB8cZank9khUfLQODzBUhBlM",
            authDomain: "attendance-check-fa0cb.firebaseapp.com",
            projectId: "attendance-check-fa0cb",
            storageBucket: "attendance-check-fa0cb.firebasestorage.app",
            messagingSenderId: "593138294374",
            appId: "1:593138294374:web:7819265228855e932717a7",
            measurementId: "G-C9QL4VH85K"
        };

        const appId = 'club-attendance-final-v2';
        let app, auth, db, user = null;
        window.clubData = {};
        window.isAdmin = false;

        async function init() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (u) {
                        updateCloudStatus("🟢 실시간 연동 활성화", "green");
                        syncData();
                    }
                });
            } catch (e) {
                updateCloudStatus("🔴 연결 오류", "red");
            }
        }

        function syncData() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_storage', 'global_state');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    window.clubData = snapshot.data().clubData || {};
                    updateUI();
                }
            });
        }

        async function saveData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance_storage', 'global_state');
            await setDoc(docRef, { clubData: window.clubData });
        }

        function updateCloudStatus(text, color) {
            document.getElementById('cloudText').textContent = text;
            document.getElementById('cloudDot').className = `w-2 h-2 rounded-full ${color === 'green' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`;
        }

        window.toggleAdminMode = function() {
            window.isAdmin = !window.isAdmin;
            const subTitle = document.getElementById('subTitle');
            const cloudStatus = document.getElementById('cloudStatus');
            
            if (window.isAdmin) {
                document.getElementById('mainLayout').className = "grid grid-cols-1 md:grid-cols-3 mt-6 transition-all duration-500";
                document.getElementById('adminSec1').classList.remove('hidden');
                document.getElementById('adminSec3').classList.remove('hidden');
                subTitle.innerHTML = "관리자 모드 활성화됨 <span class='text-blue-500'>(제목 클릭 시 종료)</span>";
                cloudStatus.classList.remove('hidden');
                window.showToast("관리자 모드로 전환되었습니다.");
            } else {
                document.getElementById('mainLayout').className = "flex justify-center mt-6 transition-all duration-500";
                document.getElementById('adminSec1').classList.add('hidden');
                document.getElementById('adminSec3').classList.add('hidden');
                subTitle.textContent = "본인의 동아리를 선택하고 출석을 완료해주세요.";
                cloudStatus.classList.add('hidden');
                window.showToast("관리자 모드가 종료되었습니다.");
            }
        }

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                let newData = {};
                json.forEach(row => {
                    const name = row[0]; const total = parseInt(row[1]);
                    if (name && !isNaN(total)) newData[name] = { total, attendees: [] };
                });
                window.clubData = newData;
                await saveData();
                window.showToast("명단 등록 완료!");
                document.getElementById('excelFile').value = '';
            };
            reader.readAsArrayBuffer(file);
        });

        window.submitAttendance = async function() {
            const clubName = document.getElementById('clubSelect').value;
            const name = document.getElementById('userName').value.trim();
            const gender = document.querySelector('input[name="gender"]:checked')?.value;
            const age = document.querySelector('input[name="age"]:checked')?.value;
            if (!clubName || !name || !gender || !age) { window.showToast("모든 항목을 입력해주세요.", "error"); return; }
            const club = window.clubData[clubName];
            if (club.attendees.some(a => a.name === name)) { window.showToast("이미 출석한 이름입니다.", "error"); return; }
            const now = new Date();
            const time = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            club.attendees.push({ name, gender, age, time });
            document.getElementById('userName').value = '';
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            await saveData();
            window.showToast(`${name}님 출석 완료!`);
        }

        window.deleteAttendee = async function(clubName, attendeeName) {
            window.clubData[clubName].attendees = window.clubData[clubName].attendees.filter(a => a.name !== attendeeName);
            await saveData();
            window.showToast("출석 기록이 삭제되었습니다.");
        }

        function updateUI() {
            const select = document.getElementById('clubSelect');
            const dashboard = document.getElementById('dashboard');
            const curVal = select.value;
            select.innerHTML = '<option value="">동아리를 선택하세요</option>';
            Object.keys(window.clubData).forEach(c => {
                const opt = document.createElement('option');
                opt.value = opt.textContent = c;
                select.appendChild(opt);
            });
            if (curVal && window.clubData[curVal]) select.value = curVal;
            const hasClubs = Object.keys(window.clubData).length > 0;
            document.getElementById('userName').disabled = !hasClubs;
            document.getElementById('submitBtn').disabled = !hasClubs;
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = !hasClubs);
            dashboard.innerHTML = '';
            for (const [name, data] of Object.entries(window.clubData)) {
                const count = data.attendees.length;
                const isMajority = count > (data.total / 2);
                const percent = Math.min((count / data.total) * 100, 100);
                const card = document.createElement('div');
                card.className = `bg-white p-5 rounded-2xl shadow-sm border-2 transition-all ${isMajority ? 'border-green-400' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <h3 class="font-bold truncate text-slate-800">${name}</h3>
                        <span class="text-[10px] font-bold px-2 py-1 rounded-lg ${isMajority ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">${isMajority ? '과반수 달성' : '미달'}</span>
                    </div>
                    <div class="flex justify-between text-sm mb-2 font-bold"><span>${count} / ${data.total}명</span><span>${Math.round(percent)}%</span></div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4"><div class="h-full transition-all duration-500 ${isMajority ? 'bg-green-500' : 'bg-blue-500'}" style="width: ${percent}%"></div></div>
                    <div class="bg-slate-50 rounded-xl p-2 h-24 overflow-y-auto custom-scrollbar flex flex-wrap content-start gap-1.5">
                        ${data.attendees.map(a => `<span class="bg-white border text-[10px] px-2 py-1 rounded-lg flex items-center shadow-sm"><b>${a.name}</b><span class="text-slate-300 ml-1">${a.time.split(' ')[1]}</span><button onclick="deleteAttendee('${name}', '${a.name}')" class="ml-1 text-slate-300 hover:text-red-500">×</button></span>`).join('') || '<span class="text-[10px] text-slate-300 italic p-1">데이터 없음</span>'}
                    </div>`;
                dashboard.appendChild(card);
            }
        }

        window.exportToExcel = function() {
            if (Object.keys(window.clubData).length === 0) return;
            const rows = [["동아리명", "총인원", "출석인원", "과반수", "19-24(남)", "19-24(여)", "25-39(남)", "25-39(여)", "상세명단"]];
            for (const [name, data] of Object.entries(window.clubData)) {
                let m1=0, f1=0, m2=0, f2=0;
                data.attendees.forEach(a => {
                    if(a.age==='19~24세' && a.gender==='남자') m1++; else if(a.age==='19~24세' && a.gender==='여자') f1++;
                    else if(a.age==='25~39세' && a.gender==='남자') m2++; else if(a.age==='25~39세' && a.gender==='여자') f2++;
                });
                rows.push([name, data.total, data.attendees.length, data.attendees.length > (data.total/2) ? "O" : "X", m1, f1, m2, f2, data.attendees.map(a => `${a.name}(${a.gender},${a.age},${a.time})`).join(', ')]);
            }
            const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "출석현황");
            XLSX.writeFile(wb, `출석결과_${new Date().toLocaleDateString().replace(/\. /g,'-').replace('.','')}.xlsx`);
        }

        window.downloadSample = function() {
            const ws = XLSX.utils.aoa_to_sheet([["동아리명", "인원수"], ["축구부", 20], ["댄스부", 12]]);
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "샘플");
            XLSX.writeFile(wb, "양식_샘플.xlsx");
        }

        window.showToast = function(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.opacity = '1';
            t.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl text-white transition-all duration-300 z-50 font-bold ${type==='success'?'bg-slate-800':'bg-red-600'}`;
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        init();
        // 초기에는 연동 상태 배지 숨김
        document.getElementById('cloudStatus').classList.add('hidden');
    </script>
</body>
</html>
